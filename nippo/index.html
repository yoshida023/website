<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>preBuild for hp2025</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #3b82f6; --active-blue: #1d4ed8; --light-blue: #e0efff;
            --border-color: #d1d5db; --draft-gray: #6b7280; --ok-green: #52c41a; --ng-red: #ff4d4f;
        }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background-color: #f0f0f0; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; background: white; min-height: 100vh; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        header { background: var(--light-blue); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo-area { font-weight: bold; font-size: 18px; color: #1a365d; }
        .main-content { padding: 15px; }
        .config-section { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 8px; padding: 12px; margin-bottom: 15px; }
        .section-box { background: #f1f7ff; border-radius: 12px; padding: 18px; border: 1px solid #cce0ff; margin-bottom: 20px; }
        h2 { font-size: 17px; margin: 0 0 15px 0; border-left: 4px solid var(--primary-blue); padding-left: 8px; }
        .action-btns-row { display: flex; gap: 8px; margin-bottom: 20px; }
        .btn-action {
            background: var(--primary-blue); color: white; border: none; border-radius: 10px;
            flex: 1; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 65px; cursor: pointer; transition: opacity 0.2s;
        }
        .btn-action:disabled { background-color: var(--active-blue); opacity: 0.8; }
        .stamp-time { font-size: 11px; margin-top: 4px; opacity: 0.9; }
        .remote-toggle { display: flex; flex-direction: column; align-items: center; cursor: pointer; min-width: 60px; }
        .form-group { margin-bottom: 12px; }
        .sub-label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; box-sizing: border-box; background: white; }
        .status-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .status-option { flex: 1; position: relative; }
        .status-option input { position: absolute; opacity: 0; }
        .status-label { display: block; padding: 10px; border: 2px solid var(--border-color); border-radius: 8px; text-align: center; font-weight: bold; cursor: pointer; color: #666; }
        .status-option input:checked + .status-label.status-ok { border-color: var(--ok-green); color: var(--ok-green); background: #f6ffed; }
        .status-option input:checked + .status-label.status-ng { border-color: var(--ng-red); color: var(--ng-red); background: #fff1f0; }
        .counter-container { display: flex; align-items: center; background: white; border: 1px solid var(--border-color); border-radius: 8px; width: fit-content; }
        .counter-btn { background: #f8f9fa; border: none; padding: 8px 15px; font-size: 18px; cursor: pointer; }
        .counter-input { width: 40px; border: none; text-align: center; font-size: 16px; font-weight: bold; }
        .btn-main { background: var(--primary-blue); color: white; border: none; padding: 16px; border-radius: 10px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">preBuild for hp2025</div>
        <div id="current-date" style="font-size: 13px; font-weight: bold;"></div>
    </header>

    <div class="main-content">
        <div class="config-section">
            <div class="form-group">
                <span class="sub-label">Slack API Token:</span>
                <input type="password" id="api-token" placeholder="xoxp-xxx">
            </div>
            <div class="form-group">
                <span class="sub-label">アラート用メンション (IDをスペース区切り):</span>
                <input type="text" id="mention-ids" placeholder="U12345678">
            </div>
            <div class="form-group">
                <span class="sub-label">勤怠送信先チャンネル:</span>
                <select id="kintai-channel">
                    <option value="#1905_勤怠連絡_5g" selected>#1905_勤怠連絡_5g</option>
                </select>
            </div>
        </div>

        <div class="section-box">
            <h2>打刻アクション</h2>
            <div class="action-btns-row">
                <button class="btn-action" id="btn-start" onclick="handleStamp(this, ':開始:')"><span>出勤</span><span class="stamp-time">--:--</span></button>
                <button class="btn-action" onclick="handleStamp(this, ':休憩入:')"><span>休憩入</span><span class="stamp-time">--:--</span></button>
                <button class="btn-action" onclick="handleStamp(this, ':休憩戻:')"><span>休憩戻</span><span class="stamp-time">--:--</span></button>
                <div class="remote-toggle" onclick="toggleRemote(this)">
                    <span style="font-size: 10px; font-weight: bold; color: #666; margin-bottom: 4px;">在宅勤務</span>
                    <i id="remote-icon" class="fa-solid fa-toggle-off fa-2x" style="color:#ccc;"></i>
                </div>
            </div>

            <h2>今日の日報報告</h2>
            <div style="font-size: 11px; color: #999; margin-bottom: 10px;">送信先: #2104_日報</div>
            
            <div class="form-group"><span class="sub-label">案件名</span><input type="text" id="project-name" class="save-state"></div>
            <div class="form-group"><span class="sub-label">担当業務</span><input type="text" id="task-name" class="save-state"></div>
            <div class="form-group">
                <span class="sub-label">開発フェーズ</span>
                <select id="phase" class="save-state">
                    <option>業務分析</option><option>要件定義・提案</option><option>基本設計</option>
                    <option>詳細設計</option><option>CD/UT</option><option>結合試験</option>
                    <option>総合試験</option><option>運用試験</option><option>リリース</option><option>本番作業</option>
                </select>
            </div>
            <div class="status-selector">
                <div class="status-option">
                    <input type="radio" name="status" id="st-ok" value="順調" class="save-state"><label for="st-ok" class="status-label status-ok">順調</label>
                </div>
                <div class="status-option">
                    <input type="radio" name="status" id="st-ng" value="遅延" class="save-state" checked><label for="st-ng" class="status-label status-ng">遅延</label>
                </div>
            </div>
            <div class="form-group"><input type="text" id="status-detail" placeholder="進捗詳細" class="save-state"></div>
            <div class="form-group">
                <span class="sub-label">担当案件数</span>
                <div class="counter-container">
                    <button class="counter-btn" onclick="changeCount(-1)">－</button>
                    <input type="number" id="project-count" class="counter-input save-state" value="1" readonly>
                    <button class="counter-btn" onclick="changeCount(1)">＋</button>
                </div>
            </div>
            <div class="form-group"><span class="sub-label">問題点</span><textarea id="issue" rows="2" class="save-state"></textarea></div>
            <div class="form-group"><span class="sub-label">備考</span><textarea id="note" rows="2" class="save-state"></textarea></div>

            <button class="btn-main" id="btn-end" onclick="handleStamp(this, ':終了:')">退勤（日報送信）</button>
        </div>
    </div>
</div>

<script src="slack-post.js"></script>
<script>
    const REPORT_CHANNEL = "#2104_日報";
    const STORAGE_KEY = "prebuild_hp2025_vFinal";
    let isRemoteActive = false;
    let startTimeValue = "--:--";

    function saveState() {
        const state = {
            token: document.getElementById('api-token').value,
            mentions: document.getElementById('mention-ids').value,
            kintaiChannel: document.getElementById('kintai-channel').value,
            task: document.getElementById('task-name').value,
            project: document.getElementById('project-name').value,
            phase: document.getElementById('phase').value,
            status: document.querySelector('input[name="status"]:checked').value,
            statusDetail: document.getElementById('status-detail').value,
            count: document.getElementById('project-count').value,
            issue: document.getElementById('issue').value,
            note: document.getElementById('note').value,
            isRemote: isRemoteActive,
            startTime: startTimeValue
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return;
        const state = JSON.parse(saved);
        document.getElementById('api-token').value = state.token || "";
        document.getElementById('mention-ids').value = state.mentions || "";
        document.getElementById('task-name').value = state.task || "";
        document.getElementById('project-name').value = state.project || "";
        document.getElementById('phase').value = state.phase || "詳細設計";
        document.getElementById('status-detail').value = state.statusDetail || "";
        document.getElementById('project-count').value = state.count || "1";
        document.getElementById('issue').value = state.issue || "";
        document.getElementById('note').value = state.note || "";
        startTimeValue = state.startTime || "--:--";
        if (startTimeValue !== "--:--") document.getElementById('btn-start').querySelector('.stamp-time').innerText = startTimeValue;
        if (state.status === "順調") document.getElementById('st-ok').checked = true;
        if (state.isRemote) toggleRemote(document.querySelector('.remote-toggle'), true);
    }

    document.addEventListener('input', () => saveState());

    function updateDate() {
        const now = new Date();
        const days = ["日", "月", "火", "水", "木", "金", "土"];
        document.getElementById('current-date').innerText = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}(${days[now.getDay()]})`;
    }

    function toggleRemote(el, forceState = null) {
        const icon = el.querySelector('i');
        isRemoteActive = forceState !== null ? forceState : icon.classList.contains('fa-toggle-off');
        icon.className = isRemoteActive ? "fa-solid fa-toggle-on fa-2x" : "fa-solid fa-toggle-off fa-2x";
        icon.style.color = isRemoteActive ? "var(--ok-green)" : "#ccc";
        saveState();
    }

    function changeCount(val) {
        const input = document.getElementById('project-count');
        input.value = Math.max(0, parseInt(input.value) + val);
        saveState();
    }

    async function handleStamp(button, slackText) {
        const token = document.getElementById('api-token').value.trim();
        const kintaiChannel = document.getElementById('kintai-channel').value;
        const time = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
        
        if (slackText === ':開始:') { startTimeValue = time; saveState(); }

        const isReport = (slackText === ':終了:');

        if(!token) { alert("Tokenを入力してください"); return; }
        button.disabled = true;
        let payload, targetChannel;
        
        
        if (isRemoteActive) {
            await sendRemoteChannel(button, slackText, token);
        }

        if (isReport) {
            targetChannel = REPORT_CHANNEL;
            const status = document.querySelector('input[name="status"]:checked').value;
            const issue = document.getElementById('issue').value;
            const note = document.getElementById('note').value;
            const mentions = document.getElementById('mention-ids').value;
            const isAlert = (status === '遅延') || (issue.trim() !== '') || (note.trim() !== '');

            payload = createReportBlocks({
                date: document.getElementById('current-date').innerText,
                startTime: startTimeValue,
                endTime: time,
                project: document.getElementById('project-name').value,
                task: document.getElementById('task-name').value,
                phase: document.getElementById('phase').value,
                status: status,
                isRemote: isRemoteActive,
                statusDetail: document.getElementById('status-detail').value,
                count: document.getElementById('project-count').value,
                issue: issue,
                note: note,
                mentions: isAlert ? mentions : ""
            });

            const success = await sendToSlackViaGAS(token, targetChannel, payload);
            if (!success) alert("日報チャンネル(slack)送信に失敗しました。");
        }

        if (isReport) alert("日報送信完了");
        const timeSpan = button.querySelector('.stamp-time');
        if (timeSpan) timeSpan.innerText = (isReport ? "打刻 " : "") + time;
        button.disabled = false;
    }

    async function sendRemoteChannel(button, slackText, token) {
        const success = await sendToSlackViaGAS(token, document.getElementById('kintai-channel').value, slackText);
        if (!success) alert("勤怠報告チャンネル(slack)送信に失敗しました。");
    }

    window.onload = () => { updateDate(); loadState(); };
</script>
</body>
</html>
