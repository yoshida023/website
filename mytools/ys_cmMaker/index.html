<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>preBuild for hp2025 - Save Button Added</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .panel { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #666; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; }
        .color-pickers { display: flex; gap: 10px; }
        .color-pickers .input-group { flex: 1; }
        button { width: 100%; padding: 15px; background: #00b900; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }
        button:disabled { background: #ccc; }
        #status { font-size: 13px; margin-top: 10px; color: #333; text-align: center; min-height: 1.5em; }
        progress { width: 100%; height: 8px; margin-top: 5px; }
        
        #downloadArea { margin-top: 20px; text-align: center; width: 100%; display: none; }
        video { width: 100%; border-radius: 8px; background: #000; margin-bottom: 15px; }
        .save-button { 
            display: block; width: 100%; padding: 18px; background: #007bff; color: white; 
            text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 18px; 
            box-shadow: 0 4px 0 #0056b3; transition: transform 0.1s;
        }
        .save-button:active { transform: translateY(4px); box-shadow: none; }
        .ios-instruction { font-size: 12px; color: #d9534f; margin-top: 12px; text-align: left; background: #fff5f5; padding: 10px; border-radius: 6px; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="panel">
        <h3 style="margin:0 0 15px 0">スタンプ動画生成</h3>
        <div class="input-group"><label>タイトル</label><input type="text" id="titleInput" value="LINEスタンプ発売中！"></div>
        <div class="input-group"><label>作者名</label><input type="text" id="authorInput" value="ヨシダスタジオ"></div>
        <div class="input-group"><label>フッター</label><input type="text" id="footerInput" value="購入はプロフィールのURLへ！"></div>
        <div class="input-group"><label>メイン画像 (ZIP内main.png優先)</label><input type="file" id="mainImgInput" accept="image/*"></div>
        <div class="input-group"><label>スタンプZIP</label><input type="file" id="zipInput" accept=".zip"></div>
        
        <div class="color-pickers">
            <div class="input-group"><label>全体の背景色</label><input type="color" id="bgColorInput" value="#f4f4f4"></div>
            <div class="input-group"><label>枠の背景色</label><input type="color" id="stampBgColorInput" value="#ffffff"></div>
        </div>
        
        <button id="generateBtn">動画を生成</button>
        <div id="status">準備完了</div>
        <progress id="progress" value="0" max="100"></progress>
        
        <div id="downloadArea">
            <video id="resultVideo" controls playsinline></video>
            <a id="saveLink" class="save-button">📥 動画をカメラロールに保存</a>
            <div class="ios-instruction">
                <strong>iPhoneの方へ：</strong><br>
                ボタンを押すと動画が開きます。その後、画面下の<strong>「共有ボタン（四角に↑）」</strong>を押し、<strong>「ビデオを保存」</strong>を選択してください。
            </div>
        </div>
    </div>

    <canvas id="exportCanvas"></canvas>

    <script type="module">
        import parseAPNG from 'https://cdn.skypack.dev/apng-js';
        import { Muxer, ArrayBufferTarget } from 'https://unpkg.com/mp4-muxer@latest/build/mp4-muxer.mjs';

        const VIDEO_W = 544; 
        const VIDEO_H = 960;
        const canvas = document.getElementById('exportCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        canvas.width = VIDEO_W;
        canvas.height = VIDEO_H;

        const generateBtn = document.getElementById('generateBtn');
        const status = document.getElementById('status');
        const progress = document.getElementById('progress');
        const downloadArea = document.getElementById('downloadArea');
        const resultVideo = document.getElementById('resultVideo');
        const saveLink = document.getElementById('saveLink');

        async function getRenderedFrames(buffer) {
            try {
                const apng = parseAPNG(buffer);
                if (apng instanceof Error) return null;
                await apng.createImages();
                const renderedFrames = [];
                const workCanvas = document.createElement('canvas');
                workCanvas.width = apng.width; workCanvas.height = apng.height;
                const workCtx = workCanvas.getContext('2d');
                apng.frames.forEach((frame) => {
                    if (frame.disposeOp === 1 || frame.blendOp === 0) workCtx.clearRect(frame.left, frame.top, frame.width, frame.height);
                    workCtx.drawImage(frame.imageElement, frame.left, frame.top);
                    const snapshot = document.createElement('canvas');
                    snapshot.width = apng.width; snapshot.height = apng.height;
                    snapshot.getContext('2d').drawImage(workCanvas, 0, 0);
                    renderedFrames.push({ img: snapshot, delay: frame.delay });
                });
                return renderedFrames;
            } catch (e) { return null; }
        }

        async function loadImage(url) {
            return new Promise((res) => {
                const img = new Image();
                img.onload = () => res(img);
                img.onerror = () => res(null);
                img.src = url;
            });
        }

        function drawBaseUI(title, author, footer, mainImg, bgColor, stampBgColor, textColor) {
            ctx.fillStyle = bgColor; ctx.fillRect(0, 0, VIDEO_W, VIDEO_H);
            if (mainImg) {
                const fs = 90;
                ctx.save();
                ctx.beginPath(); ctx.roundRect(50, 70, fs, fs, 15);
                ctx.fillStyle = stampBgColor; ctx.fill(); ctx.clip();
                const r = Math.min((fs-10)/mainImg.width, (fs-10)/mainImg.height);
                ctx.drawImage(mainImg, 50+(fs-mainImg.width*r)/2, 70+(fs-mainImg.height*r)/2, mainImg.width*r, mainImg.height*r);
                ctx.restore();
            }
            ctx.fillStyle = textColor; ctx.textAlign = "left";
            ctx.font = `bold 28px sans-serif`;
            ctx.fillText(title, 160, 105);
            ctx.font = "20px sans-serif"; ctx.fillText(author, 160, 140);
            ctx.textAlign = "center"; ctx.font = "bold 32px sans-serif";
            ctx.fillText(footer, VIDEO_W / 2, VIDEO_H - 100);
        }

        generateBtn.onclick = async () => {
            const zipFile = document.getElementById('zipInput').files[0];
            const mainImgFile = document.getElementById('mainImgInput').files[0];
            if (!zipFile) return alert("ZIPを選択してください");

            try {
                generateBtn.disabled = true;
                status.innerText = "生成開始...";
                downloadArea.style.display = "none";

                const zip = await JSZip.loadAsync(zipFile);
                const stampFiles = [];
                let autoMainFile = null;
                zip.forEach((path, file) => {
                    const fileName = path.split('/').pop().toLowerCase();
                    if (!file.dir && fileName.match(/\.(png|jpg|jpeg)$/)) {
                        if (fileName.startsWith('main')) autoMainFile = file;
                        else if (fileName.match(/^\d+/)) stampFiles.push(file);
                    }
                });
                stampFiles.sort((a, b) => parseInt(a.name.match(/\d+/)[0]) - parseInt(b.name.match(/\d+/)[0]));

                let mainImg = null;
                if (mainImgFile) mainImg = await loadImage(URL.createObjectURL(mainImgFile));
                else if (autoMainFile) mainImg = await loadImage(URL.createObjectURL(await autoMainFile.async("blob")));

                const textColor = ((hex) => {
                    const r = parseInt(hex.substr(1,2),16), g = parseInt(hex.substr(3,2),16), b = parseInt(hex.substr(5,2),16);
                    return ((r*299)+(g*587)+(b*114))/1000 >= 128 ? '#000000' : '#ffffff';
                })(document.getElementById('bgColorInput').value);

                let muxer = new Muxer({
                    target: new ArrayBufferTarget(),
                    video: { codec: 'avc', width: VIDEO_W, height: VIDEO_H },
                    fastStart: 'in-memory'
                });

                let encoder = new VideoEncoder({
                    output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
                    error: (e) => alert(e.message)
                });

                encoder.configure({ codec: 'avc1.42E01E', width: VIDEO_W, height: VIDEO_H, bitrate: 1_200_000, framerate: 30 });
                while (encoder.state !== "configured") await new Promise(r => setTimeout(r, 100));

                let frameCount = 0;
                for (let i = 0; i < stampFiles.length; i++) {
                    status.innerText = `生成中: ${i + 1} / ${stampFiles.length}`;
                    progress.value = ((i + 1) / stampFiles.length) * 100;

                    const buffer = await stampFiles[i].async("arraybuffer");
                    let frames = await getRenderedFrames(buffer);
                    if (!frames) {
                        const img = await loadImage(URL.createObjectURL(new Blob([buffer])));
                        if (!img) continue;
                        frames = [{ img, delay: 1000 }];
                    }

                    let stampTime = 0;
                    const totalApngMs = frames.reduce((a, b) => a + b.delay, 0) || 1000;

                    while (stampTime < 1.0) {
                        if (encoder.encodeQueueSize > 2) await new Promise(r => setTimeout(r, 50));

                        drawBaseUI(document.getElementById('titleInput').value, document.getElementById('authorInput').value, document.getElementById('footerInput').value, mainImg, document.getElementById('bgColorInput').value, document.getElementById('stampBgColorInput').value, textColor);
                        
                        const fs = 420;
                        const currentMs = (stampTime * 1000) % totalApngMs;
                        let acc = 0, targetFrame = frames[0];
                        for (const f of frames) {
                            acc += f.delay;
                            if (currentMs < acc) { targetFrame = f; break; }
                        }

                        ctx.save();
                        ctx.beginPath(); ctx.roundRect((VIDEO_W-fs)/2, (VIDEO_H-fs)/2, fs, fs, 30);
                        ctx.fillStyle = document.getElementById('stampBgColorInput').value; ctx.fill(); ctx.clip();
                        const r = Math.min((fs-40)/targetFrame.img.width, (fs-40)/targetFrame.img.height);
                        ctx.drawImage(targetFrame.img, (VIDEO_W-targetFrame.img.width*r)/2, (VIDEO_H-targetFrame.img.height*r)/2, targetFrame.img.width*r, targetFrame.img.height*r);
                        ctx.restore();

                        ctx.textAlign = "center"; ctx.fillStyle = textColor; ctx.font = "bold 40px sans-serif";
                        ctx.fillText(`No. ${i + 1}`, VIDEO_W / 2, (VIDEO_H+fs)/2 + 70);

                        encoder.encode(new VideoFrame(canvas, { timestamp: (frameCount++ * 1000000) / 30, duration: 1000000 / 30 }));
                        stampTime += 1/30;
                        await new Promise(r => requestAnimationFrame(r));
                    }
                    if (i % 5 === 0) await encoder.flush();
                }

                await encoder.flush();
                muxer.finalize();
                
                const blob = new Blob([muxer.target.buffer], { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                
                resultVideo.src = url;
                saveLink.href = url;
                // iPhoneの「ファイル」アプリに保存されやすいように名前をセット
                saveLink.download = `stamp_promo_${Date.now()}.mp4`; 
                
                downloadArea.style.display = "block";
                status.innerText = "生成完了！";
            } catch (err) {
                status.innerText = "エラー: " + err.message;
            } finally {
                generateBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
