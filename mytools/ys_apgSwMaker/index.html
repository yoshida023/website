<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>LINE APNG Final Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/1.0.11/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upng-js@2.1.0/UPNG.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 40px; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 640px; }
        .upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .card { background: #fafafa; border: 1px solid #ddd; padding: 15px; border-radius: 8px; text-align: center; }
        .preview-box { width: 100%; height: 120px; margin-top: 10px; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; background: #fff; }
        .transparent-check { background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%); background-size: 10px 10px; }
        canvas { border: 4px solid #333; border-radius: 4px; max-width: 100%; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        button { padding: 12px 30px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #btnPlay { background: #007bff; color: white; }
        #btnSave { background: #00b900; color: white; }
        #status { margin-top: 20px; font-weight: bold; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; margin-top:0;">LINEスタンプSwipe生成 (最終対策版)</h2>
    
    <div class="upload-row">
        <div class="card">
            <strong>Before (1.5s)</strong>
            <input type="file" id="fB" accept="image/png" style="width:100%; margin:10px 0;">
            <div class="preview-box transparent-check"><img id="tB" style="max-width:100%; max-height:100%;"></div>
        </div>
        <div class="card">
            <strong>After (2.45s)</strong>
            <input type="file" id="fA" accept="image/png" style="width:100%; margin:10px 0;">
            <div class="preview-box transparent-check"><img id="tA" style="max-width:100%; max-height:100%;"></div>
        </div>
    </div>

    <div style="text-align:center;">
        <canvas id="cvs" width="320" height="270" class="transparent-check"></canvas>
        <div class="controls">
            <button id="btnPlay">プレビュー再生</button>
            <button id="btnSave">APNGを生成・保存</button>
        </div>
        <div id="status"></div>
    </div>
</div>

<script>
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d', { alpha: true });
const status = document.getElementById('status');

let imgA = null, imgB = null;

async function load(file, tid) {
    if(!file) return null;
    const url = URL.createObjectURL(file);
    document.getElementById(tid).src = url;
    const img = new Image();
    img.src = url;
    await img.decode();
    return img;
}

document.getElementById('fB').onchange = async (e) => imgB = await load(e.target.files[0], 'tB');
document.getElementById('fA').onchange = async (e) => imgA = await load(e.target.files[0], 'tA');

function draw(mode, p = 0) {
    ctx.clearRect(0,0,320,270);
    if(!imgA || !imgB) return;
    if(mode === 'A') ctx.drawImage(imgA, 0, 0, 320, 270);
    else if(mode === 'B') ctx.drawImage(imgB, 0, 0, 320, 270);
    else if(mode === 'S') {
        ctx.drawImage(imgB, -320*p, 0, 320, 270);
        ctx.drawImage(imgA, 320-320*p, 0, 320, 270);
    }
}

document.getElementById('btnPlay').onclick = async () => {
    if(!imgA || !imgB) return;
    draw('A'); await new Promise(r => setTimeout(r, 50));
    draw('B'); await new Promise(r => setTimeout(r, 1500));
    const start = performance.now();
    while(performance.now() - start < 100) {
        draw('S', (performance.now()-start)/100);
        await new Promise(r => requestAnimationFrame(r));
    }
    draw('A'); await new Promise(r => setTimeout(r, 2350));
};

document.getElementById('btnSave').onclick = async () => {
    if(!imgA || !imgB) return;
    status.innerText = "生成中...";
    
    const frames = [], delays = [];

    // 1. After画像をキャプチャ（これを1枚目と最後に使う）
    draw('A');
    const afterData = ctx.getImageData(0,0,320,270).data.buffer;

    // 2. Before画像をキャプチャ
    draw('B');
    const beforeData = ctx.getImageData(0,0,320,270).data.buffer;

    // --- フレーム構築 (厳密な4000ms) ---
    frames.push(afterData); delays.push(50);   // 1: Preview(After)
    frames.push(beforeData); delays.push(1500); // 2: Before
    
    for(let i=1; i<=5; i++){
        draw('S', i/5);
        frames.push(ctx.getImageData(0,0,320,270).data.buffer);
        delays.push(20);
    }
    
    frames.push(afterData); delays.push(2350); // 8: After (最終)

    try {
        // UPNG.encode: 1ループ, カラー数0(RGBA強制)
        const apng = UPNG.encode(frames, 320, 270, 1, delays, 0);
        const size = apng.byteLength / 1024;
        
        if(size > 320) {
            status.innerHTML = `<span style="color:red">失敗: ${Math.round(size)}KB (320KB以内にする必要があります)</span>`;
        } else {
            const blob = new Blob([apng], {type:"image/png"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `line_stamp_final.png`;
            a.click();
            status.innerHTML = `<span style="color:green">成功！サイズ: ${Math.round(size)}KB</span>`;
        }
    } catch(e) {
        status.innerText = "エラーが発生しました";
    }
};
</script>
</body>
</html>
