<div class="container">
    <h3>スタンプ動画変換</h3>
    
    <div class="input-group">
        <label>背景色（透過部分）</label>
        <input type="color" id="bgColorInput" value="#8DACD6">
    </div>

    <div class="input-group">
        <label>スタンプZIPを選択</label>
        <input type="file" id="zipInput" accept=".zip">
    </div>

    <div id="stampGrid"></div>

    <button id="generateBtn" disabled>動画を生成 (0個選択中)</button>
    </div>

<script type="module">
    // ... 前略 ...
    generateBtn.onclick = async () => {
        try {
            generateBtn.disabled = true;
            document.getElementById('videoContainer').innerHTML = "";
            const files = allStampFiles.filter(f => selectedFiles.has(f));
            const bgColor = document.getElementById('bgColorInput').value; // 色を取得
            
            for(let i=0; i < files.length; i++) {
                status.innerText = `生成中 (${i+1}/${files.length}): ${files[i].name}`;
                
                const blob = await generateStampVideo({
                    file: files[i].entry,
                    bgColor: bgColor, // パラメータに渡す
                    canvas, ctx
                });
                // ... 以下、表示・保存ロジック ...
            }
            status.innerText = "すべての生成が完了しました";
        } catch (err) {
            console.error(err);
            status.innerText = "エラー: " + err.message;
        } finally {
            generateBtn.disabled = false;
        }
    };
</script>
