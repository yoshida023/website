<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタンプ動画変換 (サイズ維持版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 600px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        #stampGrid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); 
            gap: 10px; 
            margin: 20px 0; 
            max-height: 400px; 
            overflow-y: auto; 
            border: 1px solid #eee; 
            padding: 10px;
            border-radius: 8px;
        }
        .stamp-item { 
            aspect-ratio: 1; 
            border: 2px solid transparent; 
            border-radius: 8px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #f0f0f0;
            overflow: hidden;
        }
        .stamp-item img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .stamp-item.selected { border-color: #00b900; background: #e6ffe6; }

        button { width: 100%; padding: 15px; background: #00b900; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }
        #status { margin-top: 10px; font-size: 14px; text-align: center; }
        #downloadArea { margin-top: 20px; display: none; text-align: center; }
        video { width: 100%; max-width: 320px; border-radius: 8px; background: #000; }
        .save-btn { display: block; margin-top: 10px; padding: 15px; background: #007bff; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h3>スタンプ動画変換</h3>
    <p style="font-size: 12px; color: #666;">※元の画像サイズで個別にMP4化します</p>
    
    <div class="input-group">
        <label>スタンプZIPを選択</label>
        <input type="file" id="zipInput" accept=".zip">
    </div>

    <div id="stampGrid"></div>

    <button id="generateBtn" disabled>動画を生成 (0個選択中)</button>
    <div id="status">ZIPをアップロードしてください</div>

    <div id="downloadArea">
        <div id="videoContainer"></div>
        <p style="font-size: 11px; margin-top: 10px;">※複数選択時はZIPにまとめてダウンロード、または順次表示します</p>
    </div>
</div>

<canvas id="exportCanvas" style="display:none"></canvas>

<script type="module">
    import { generateStampVideo } from './videoEncoder.js';

    const zipInput = document.getElementById('zipInput');
    const stampGrid = document.getElementById('stampGrid');
    const generateBtn = document.getElementById('generateBtn');
    const status = document.getElementById('status');
    const canvas = document.getElementById('exportCanvas');
    const ctx = canvas.getContext('2d');

    let selectedFiles = new Set();
    let allStampFiles = [];

    zipInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        status.innerText = "解析中...";
        stampGrid.innerHTML = "";
        selectedFiles.clear();
        updateBtnState();

        const zip = await JSZip.loadAsync(file);
        const promises = [];
        zip.forEach((path, zipEntry) => {
            if (!zipEntry.dir && path.match(/\.(png|apng)$/i) && !path.startsWith('__MACOSX')) {
                promises.push((async () => {
                    const buffer = await zipEntry.async("arraybuffer");
                    const url = URL.createObjectURL(new Blob([buffer], { type: "image/png" }));
                    return { name: path.split('/').pop(), entry: zipEntry, url };
                })());
            }
        });

        allStampFiles = (await Promise.all(promises)).sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
        allStampFiles.forEach(item => {
            const div = document.createElement('div');
            div.className = 'stamp-item';
            const img = document.createElement('img');
            img.src = item.url;
            div.appendChild(img);
            div.onclick = () => {
                if (selectedFiles.has(item)) { selectedFiles.delete(item); div.classList.remove('selected'); }
                else { selectedFiles.add(item); div.classList.add('selected'); }
                updateBtnState();
            };
            stampGrid.appendChild(div);
        });
        status.innerText = `${allStampFiles.length}個のスタンプを読み込みました`;
        generateBtn.disabled = false;
    };

    function updateBtnState() {
        generateBtn.innerText = `動画を生成 (${selectedFiles.size}個選択中)`;
        generateBtn.disabled = selectedFiles.size === 0;
    }

    generateBtn.onclick = async () => {
        try {
            generateBtn.disabled = true;
            document.getElementById('videoContainer').innerHTML = "";
            const files = allStampFiles.filter(f => selectedFiles.has(f));
            
            for(let i=0; i < files.length; i++) {
                status.innerText = `生成中 (${i+1}/${files.length}): ${files[i].name}`;
                
                const blob = await generateStampVideo({
                    file: files[i].entry,
                    canvas, ctx
                });

                const url = URL.createObjectURL(blob);
                const v = document.createElement('video');
                v.src = url;
                v.controls = true;
                v.playsInline = true;
                
                const a = document.createElement('a');
                a.href = url;
                a.download = files[i].name.replace(/\.(png|apng)$/i, '.mp4');
                a.className = "save-btn";
                a.innerText = `📥 ${files[i].name} を保存`;

                const wrapper = document.createElement('div');
                wrapper.style.marginBottom = "20px";
                wrapper.appendChild(v);
                wrapper.appendChild(a);
                document.getElementById('videoContainer').appendChild(wrapper);
            }

            document.getElementById('downloadArea').style.display = "block";
            status.innerText = "すべての生成が完了しました";
        } catch (err) {
            console.error(err);
            status.innerText = "エラーが発生しました";
        } finally {
            generateBtn.disabled = false;
        }
    };
</script>
</body>
</html>
