<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TileCraft - Alpha Video Exporter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; max-width: 900px; margin: 40px auto; background: #f9f9f9; color: #333; }
        .upload-area { border: 3px dashed #cbd5e0; background: white; padding: 40px; text-align: center; border-radius: 12px; transition: 0.3s; }
        .upload-area:hover { border-color: #4a90e2; }
        #log { background: #2d3748; color: #a0aec0; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; margin: 20px 0; height: 100px; overflow-y: auto; }
        
        /* ギャラリー表示 */
        .video-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .video-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        video { width: 100%; height: 150px; background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMUlEQVQ4T2NkYGAQYcAP3MhOpHHAaEMDA4MAMJHWBqMIjE9QWgx9fLIpSNYHicByBAAn4SAnY9AnbwAAAABJRU5ErkJggg=='); border-radius: 4px; border: 1px solid #eee; }
        .download-btn { display: inline-block; margin-top: 10px; padding: 8px 16px; background: #48bb78; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .download-btn:hover { background: #38a169; }
        .format-label { display: block; font-size: 12px; color: #718096; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🎥 透過動画ジェネレーター</h2>
    <p>ZIP内の連番APNGを、余白をカットして透過動画に変換します。</p>

    <div class="upload-area">
        <input type="file" id="zipInput" accept=".zip" style="display:none">
        <button onclick="document.getElementById('zipInput').click()" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">ZIPファイルを選択</button>
        <p id="fileName" style="margin-top:10px; color: #666;">ファイルが選択されていません</p>
        <button id="processBtn" disabled style="background:#4a90e2; color:white; border:none; padding:12px 30px; border-radius:6px; cursor:pointer;">動画を生成する</button>
    </div>

    <div id="log">ログ: 待機中...</div>

    <div class="video-gallery" id="gallery">
        </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: false });
        const logElement = document.getElementById('log');
        const gallery = document.getElementById('gallery');

        function addLog(msg) {
            logElement.innerHTML += `<div>> ${msg}</div>`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        // 余白（Bounding Box）計算
        function getBoundingBox(ctx, width, height) {
            const imgData = ctx.getImageData(0, 0, width, height).data;
            let minX = width, minY = height, maxX = 0, maxY = 0, found = false;
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    if (imgData[(y * width + x) * 4 + 3] > 0) {
                        if (x < minX) minX = x; if (x > maxX) maxX = x;
                        if (y < minY) minY = y; if (y > maxY) maxY = y;
                        found = true;
                    }
                }
            }
            return found ? { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 } : null;
        }

        // 動画カードを作成して追加
        function createVideoCard(blob, filename, typeLabel) {
            const url = URL.createObjectURL(blob);
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <span class="format-label">${typeLabel}</span>
                <video src="${url}" controls loop autoplay muted></video>
                <a href="${url}" download="${filename}" class="download-btn">ダウンロード</a>
            `;
            gallery.appendChild(card);
        }

        document.getElementById('zipInput').onchange = (e) => {
            document.getElementById('fileName').innerText = e.target.files[0].name;
            document.getElementById('processBtn').disabled = false;
        };

        document.getElementById('processBtn').onclick = async () => {
            const fileInput = document.getElementById('zipInput');
            const btn = document.getElementById('processBtn');
            btn.disabled = true;
            gallery.innerHTML = '';
            addLog("処理を開始しました...");

            try {
                const zip = await JSZip.loadAsync(fileInput.files[0]);
                const files = Object.keys(zip.files)
                    .filter(name => name.match(/\.(png|apng)$/i))
                    .sort((a, b) => a.localeCompare(b, undefined, {numeric: true}));

                if (files.length === 0) throw new Error("ZIP内に画像が見分りません。");

                if (!ffmpeg.isLoaded()) await ffmpeg.load();

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                let finalBox = { x: 9999, y: 9999, maxX: 0, maxY: 0 };

                addLog("全フレームの余白を解析中...");
                for (const name of files) {
                    const blob = await zip.files[name].async("blob");
                    const img = await createImageBitmap(blob);
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    const box = getBoundingBox(ctx, img.width, img.height);
                    if (box) {
                        finalBox.x = Math.min(finalBox.x, box.x);
                        finalBox.y = Math.min(finalBox.y, box.y);
                        finalBox.maxX = Math.max(finalBox.maxX, box.x + box.w);
                        finalBox.maxY = Math.max(finalBox.maxY, box.y + box.h);
                    }
                }

                const cropW = finalBox.maxX - finalBox.x;
                const cropH = finalBox.maxY - finalBox.y;

                for (let i = 0; i < files.length; i++) {
                    const blob = await zip.files[files[i]].async("blob");
                    const img = await createImageBitmap(blob);
                    canvas.width = cropW; canvas.height = cropH;
                    ctx.clearRect(0, 0, cropW, cropH);
                    ctx.drawImage(img, finalBox.x, finalBox.y, cropW, cropH, 0, 0, cropW, cropH);
                    const frameBlob = await new Promise(res => canvas.toBlob(res, 'image/png'));
                    ffmpeg.FS('writeFile', `f${i}.png`, await fetchFile(frameBlob));
                }

                addLog("WebM (Chrome/Windows用) を生成中...");
                await ffmpeg.run('-framerate', '10', '-i', 'f%d.png', '-c:v', 'libvpx-vp9', '-pix_fmt', 'yuva420p', 'out.webm');
                createVideoCard(new Blob([ffmpeg.FS('readFile', 'out.webm').buffer], {type:'video/webm'}), "transparent.webm", "WebM (VP9 + Alpha)");

                addLog("MP4 (iOS/macOS用) を生成中...");
                // Note: ffmpeg.wasmの標準ビルドではx265の透過エンコードが制限される場合があります
                await ffmpeg.run('-framerate', '10', '-i', 'f%d.png', '-c:v', 'libx265', '-pix_fmt', 'yuva420p', '-tag:v', 'hvc1', 'out.mp4');
                createVideoCard(new Blob([ffmpeg.FS('readFile', 'out.mp4').buffer], {type:'video/mp4'}), "transparent.mp4", "MP4 (HEVC + Alpha)");

                addLog("すべての処理が完了しました。");
            } catch (err) {
                addLog("エラー: " + err.message);
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
