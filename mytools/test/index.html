<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TileCraft - 個別スタンプ動画変換</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --primary-color: #00b900;
            --bg-color: #f8f9fa;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 24px; border-radius: 16px; width: 100%; max-width: 500px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); box-sizing: border-box; }
        h3 { margin-top: 0; color: #333; text-align: center; }
        .description { font-size: 13px; color: #666; margin-bottom: 20px; line-height: 1.5; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 8px; color: #555; }
        input[type="file"] { width: 100%; padding: 12px; border: 2px dashed #ddd; border-radius: 8px; cursor: pointer; }
        input[type="color"] { width: 100%; height: 40px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; background: none; }

        /* スタンプ一覧のグリッド表示 */
        #stampGrid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); 
            gap: 8px; 
            margin: 20px 0; 
            max-height: 300px; 
            overflow-y: auto; 
            border: 1px solid #eee; 
            padding: 12px;
            border-radius: 10px;
            background: #fafafa;
        }
        .stamp-item { 
            aspect-ratio: 1; 
            border: 3px solid transparent; 
            border-radius: 8px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #fff;
            transition: all 0.2s ease;
            position: relative;
        }
        .stamp-item img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .stamp-item.selected { border-color: var(--primary-color); background: #f0fff0; }
        .stamp-item.selected::after { content: "✓"; position: absolute; top: -2px; right: 2px; color: var(--primary-color); font-weight: bold; font-size: 14px; }

        button { width: 100%; padding: 16px; background: var(--primary-color); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: opacity 0.2s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        #status { margin-top: 15px; font-size: 14px; text-align: center; color: #444; min-height: 1.2em; }
        
        #downloadArea { margin-top: 24px; display: none; width: 100%; }
        #videoList { display: flex; flex-direction: column; gap: 15px; }
        .video-card { background: #f0f0f0; padding: 12px; border-radius: 12px; text-align: center; }
        video { width: 100%; max-width: 240px; border-radius: 4px; background: #000; margin-bottom: 8px; }
        .save-btn { display: block; padding: 12px; background: #007bff; color: white; text-decoration: none; border-radius: 8px; font-size: 14px; font-weight: bold; }
        
        #exportCanvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h3>TileCraft スタンプ変換</h3>
    <p class="description">ZIP内のAPNGを選択して、元のサイズのままMP4動画に変換します。背景色（透過部分の色）を指定できます。</p>
    
    <div class="input-group">
        <label>背景色（デフォルト: #8DACD6）</label>
        <input type="color" id="bgColorInput" value="#8DACD6">
    </div>

    <div class="input-group">
        <label>スタンプZIPファイルをアップロード</label>
        <input type="file" id="zipInput" accept=".zip">
    </div>

    <div id="stampGrid">
        </div>

    <button id="generateBtn" disabled>動画を生成 (0個選択中)</button>
    <div id="status">ZIPを選択してください</div>

    <div id="downloadArea">
        <div id="videoList"></div>
    </div>
</div>

<canvas id="exportCanvas"></canvas>

<script type="module">
    import { generateStampVideo } from './videoEncoder.js';

    const zipInput = document.getElementById('zipInput');
    const stampGrid = document.getElementById('stampGrid');
    const generateBtn = document.getElementById('generateBtn');
    const status = document.getElementById('status');
    const canvas = document.getElementById('exportCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    let selectedItems = new Set();
    let allStampFiles = [];

    // ZIP読み込み処理
    zipInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        status.innerText = "ZIPファイルを解析中...";
        stampGrid.innerHTML = "";
        selectedItems.clear();
        updateBtnState();

        try {
            const zip = await JSZip.loadAsync(file);
            const promises = [];
            
            zip.forEach((path, zipEntry) => {
                // ディレクトリを除外し、APNG/PNGのみを対象とする
                if (!zipEntry.dir && path.match(/\.(png|apng)$/i) && !path.startsWith('__MACOSX')) {
                    promises.push((async () => {
                        const buffer = await zipEntry.async("arraybuffer");
                        const blob = new Blob([buffer], { type: "image/png" });
                        const url = URL.createObjectURL(blob);
                        return { name: path.split('/').pop(), entry: zipEntry, url };
                    })());
                }
            });

            allStampFiles = (await Promise.all(promises)).sort((a, b) => 
                a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' })
            );

            if (allStampFiles.length === 0) {
                status.innerText = "有効な画像ファイルが見つかりませんでした。";
                return;
            }

            allStampFiles.forEach(item => {
                const div = document.createElement('div');
                div.className = 'stamp-item';
                const img = document.createElement('img');
                img.src = item.url;
                div.appendChild(img);

                div.onclick = () => {
                    if (selectedItems.has(item)) {
                        selectedItems.delete(item);
                        div.classList.remove('selected');
                    } else {
                        selectedItems.add(item);
                        div.classList.add('selected');
                    }
                    updateBtnState();
                };
                stampGrid.appendChild(div);
            });

            status.innerText = `${allStampFiles.length}個のスタンプを読み込みました`;
            generateBtn.disabled = false;
        } catch (err) {
            console.error(err);
            status.innerText = "ZIPの読み込みに失敗しました。";
        }
    };

    function updateBtnState() {
        generateBtn.innerText = `動画を生成 (${selectedItems.size}個選択中)`;
        generateBtn.disabled = selectedItems.size === 0;
    }

    // 動画生成実行
    generateBtn.onclick = async () => {
        try {
            generateBtn.disabled = true;
            document.getElementById('videoList').innerHTML = "";
            document.getElementById('downloadArea').style.display = "block";
            
            const filesToProcess = allStampFiles.filter(f => selectedItems.has(f));
            const bgColor = document.getElementById('bgColorInput').value;
            
            for (let i = 0; i < filesToProcess.length; i++) {
                const item = filesToProcess[i];
                status.innerText = `生成中 (${i + 1}/${filesToProcess.length}): ${item.name}`;
                
                // videoEncoder.js の関数を呼び出し
                const blob = await generateStampVideo({
                    file: item.entry,
                    bgColor: bgColor,
                    canvas, 
                    ctx
                });

                const url = URL.createObjectURL(blob);
                
                // 結果表示用UIの作成
                const card = document.createElement('div');
                card.className = 'video-card';
                
                const v = document.createElement('video');
                v.src = url;
                v.controls = true;
                v.playsInline = true;
                
                const a = document.createElement('a');
                a.href = url;
                a.download = item.name.replace(/\.(png|apng)$/i, '.mp4');
                a.className = "save-btn";
                a.innerText = `📥 ${item.name.replace(/\.(png|apng)$/i, '.mp4')} を保存`;

                card.appendChild(v);
                card.appendChild(a);
                document.getElementById('videoList').appendChild(card);
            }

            status.innerText = "すべての動画生成が完了しました！";
        } catch (err) {
            console.error(err);
            status.innerText = "エラー: " + err.message;
        } finally {
            generateBtn.disabled = false;
        }
    };
</script>
</body>
</html>
