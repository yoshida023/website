<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>preBuild for hp2025 - TikTok紹介動画生成</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; line-height: 1.6; }
        .input-box { margin-bottom: 20px; border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>TikTok紹介動画生成</h1>
    <div class="input-box">
        <input type="file" id="zipInput" accept=".zip"><br>
        <input type="text" id="title" placeholder="タイトル" value="スタンプ紹介">
        <input type="text" id="author" placeholder="作者名" value="作者名">
        <textarea id="comment" placeholder="コメント">TikTokで使ってね！</textarea>
    </div>
    <button id="generateBtn">動画を生成してダウンロード</button>

    <script type="module">
        import { VideoCore } from './modules/VideoCore.js';
        import { UIHelper } from './modules/UIHelper.js';

        // TikTok用高画質設定 (実績コードの構造を参考)
        const TIKTOK_CONFIG = {
            width: 1080, height: 1920, fps: 30, bitrate: 5_000_000, codec: 'avc1.640028'
        };

        document.getElementById('generateBtn').addEventListener('click', async () => {
            const file = document.getElementById('zipInput').files[0];
            if (!file) return alert('ZIPを選択してください');

            // 1. フレーム取得
            const buffer = await file.arrayBuffer();
            const renderedFrames = await VideoCore.getRenderedFrames(buffer);
            if (!renderedFrames) return alert('解析失敗');

            // 2. エンコーダー初期化
            const { muxer, encoder } = await VideoCore.createEncoder(TIKTOK_CONFIG, false);
            
            const canvas = document.createElement('canvas');
            canvas.width = TIKTOK_CONFIG.width;
            canvas.height = TIKTOK_CONFIG.height;
            const ctx = canvas.getContext('2d');

            const totalFrames = 300; // 10秒
            const isEmoji = false; // 必要に応じてUIから取得
            const cols = isEmoji ? 7 : 4;
            const cellSize = 200;
            const gap = 40;
            const headerHeight = 400;

            // 3. 動画ループ生成
            for (let i = 0; i < totalFrames; i++) {
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, 1080, 1920);

                // スクロール計算
                const maxScroll = Math.max(0, (Math.ceil(renderedFrames.length / cols) * (cellSize + gap)) - 1200);
                const scrollY = (i / totalFrames) * maxScroll;

                // スタンプ描画
                renderedFrames.forEach((f, idx) => {
                    const col = idx % cols;
                    const row = Math.floor(idx / cols);
                    const x = 80 + col * (cellSize + gap);
                    const y = headerHeight + row * (cellSize + gap) - scrollY;
                    
                    if (y > -cellSize && y < 1920) {
                        ctx.drawImage(f.img, x, y, cellSize, cellSize);
                    }
                });

                // ヘッダー・フッター描画 (UIHelper活用)
                UIHelper.drawTextFit(ctx, document.getElementById('title').value, 540, 50, 900, 80, '#000');
                UIHelper.drawTextFit(ctx, document.getElementById('author').value, 540, 150, 800, 40, '#666');
                UIHelper.drawTextWrap(ctx, document.getElementById('comment').value, 540, 1700, 900, 30, '#333');

                const vFrame = new VideoFrame(canvas, { timestamp: i * 33333 });
                encoder.encode(vFrame);
                vFrame.close();
            }

            await encoder.flush();
            
            // 4. ダウンロード
            const blob = new Blob([muxer.target.buffer], { type: 'video/mp4' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'tiktok_sticker_preview.mp4';
            link.click();
        });
    </script>
</body>
</html>
