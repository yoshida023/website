<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>preBuild for hp2025 - Mobile Optimized</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upng-js@2.1.0/UPNG.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; text-align: center; background: #f0f2f5; padding: 15px; color: #333; margin: 0; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 100%; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); box-sizing: border-box; }
        h1 { font-size: 1.2rem; margin: 0 0 15px 0; color: #00b900; }
        .config { background: #f8f9fa; padding: 15px; border-radius: 12px; margin: 15px 0; text-align: left; border: 1px solid #eee; }
        label { font-size: 0.75rem; font-weight: bold; display: block; margin-top: 10px; color: #666; }
        select, button, input[type="text"] { padding: 12px; margin: 5px 0; width: 100%; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; appearance: none; -webkit-appearance: none; }
        input[type="range"] { width: 100%; margin: 15px 0; }
        button { background: #00b900; color: white; border: none; font-weight: bold; cursor: pointer; height: 54px; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }
        button:disabled { background: #ccc; }
        #videoPreviewContainer { position: relative; margin-top: 10px; background: #000; border-radius: 10px; overflow: hidden; line-height: 0; }
        video { width: 100%; height: auto; display: block; }
        .slider-box { background: #fffde7; padding: 12px; border-radius: 10px; border: 1px solid #fff59d; margin: 10px 0; text-align: left; }
        #resultImgContainer { margin-top: 20px; background-image: linear-gradient(45deg, #ccc 25%, transparent 25%, transparent 75%, #ccc 75%), linear-gradient(45deg, #ccc 25%, transparent 25%, transparent 75%, #ccc 75%); background-size: 16px 16px; background-color: #eee; border-radius: 12px; min-height: 150px; display: flex; align-items: center; justify-content: center; overflow-x: auto; }
        img { max-width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>preBuild for hp2025</h1>
    
    <input type="file" id="videoInput" accept="video/mp4,video/quicktime" style="font-size: 12px;">
    
    <div id="videoPreviewContainer">
        <video id="hiddenVideo" muted playsinline preload="auto"></video>
    </div>

    <div class="slider-box">
        <label>📸 表紙（1枚目）のシーン: <span id="startTimeDisplay">0.00</span>s</label>
        <input type="range" id="startTimeSlider" min="0" max="1" step="0.05" value="0">
    </div>

    <div class="config">
        <label>透過色 (動画をタップして抽出)</label>
        <div style="display:flex; gap:10px; align-items: center;">
            <div id="colorPreview" style="width:44px; height:44px; background:#fff; border:1px solid #ccc; border-radius:8px; flex-shrink: 0;"></div>
            <input type="text" id="chromaHex" value="#FFFFFF">
        </div>

        <div style="display:flex; gap:10px;">
            <div style="flex:1;">
                <label>許容範囲</label>
                <input type="range" id="rangeSlider" min="0" max="150" value="30">
            </div>
            <div style="flex:1;">
                <label>滑らかさ</label>
                <input type="range" id="smoothSlider" min="1" max="50" value="5">
            </div>
        </div>

        <label>ループ回数</label>
        <select id="loopCount">
            <option value="1">1回</option><option value="2">2回</option>
            <option value="3">3回</option><option value="4">4回</option>
        </select>
    </div>

    <button id="convertBtn" disabled>APNGを作成保存</button>
    <div id="statusText" style="margin-top:10px; font-size:13px; color:#666;">動画を選択してください</div>

    <div id="previewContainer" style="display:none;">
        <div id="resultImgContainer"></div>
        <p style="font-size:11px; color:#888;">画像を長押しして「写真に保存」してください</p>
    </div>
</div>

<canvas id="workCanvas" style="display:none;"></canvas>

<script>
    const videoInput = document.getElementById('videoInput');
    const convertBtn = document.getElementById('convertBtn');
    const statusText = document.getElementById('statusText');
    const video = document.getElementById('hiddenVideo');
    const canvas = document.getElementById('workCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    const startTimeSlider = document.getElementById('startTimeSlider');
    const startTimeDisplay = document.getElementById('startTimeDisplay');
    const chromaHex = document.getElementById('chromaHex');
    const colorPreview = document.getElementById('colorPreview');

    // iOSのタッチ操作対応
    const getPickPosition = (e) => {
        const rect = video.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const x = (clientX - rect.left) * (video.videoWidth / rect.width);
        const y = (clientY - rect.top) * (video.videoHeight / rect.height);
        return {x, y};
    };

    const pickColor = (e) => {
        const {x, y} = getPickPosition(e);
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const p = ctx.getImageData(x, y, 1, 1).data;
        const hex = "#" + ((1 << 24) + (p[0] << 16) + (p[1] << 8) + p[2]).toString(16).slice(1).toUpperCase();
        chromaHex.value = hex; colorPreview.style.background = hex;
        e.preventDefault();
    };

    video.addEventListener('touchstart', pickColor);
    video.addEventListener('click', pickColor);

    startTimeSlider.addEventListener('input', () => {
        const val = parseFloat(startTimeSlider.value);
        startTimeDisplay.innerText = val.toFixed(2);
        video.currentTime = val;
    });

    videoInput.addEventListener('change', (e) => {
        if (e.target.files[0]) {
            const file = e.target.files[0];
            video.src = URL.createObjectURL(file);
            statusText.innerText = "読み込み中...";
            video.onloadedmetadata = () => {
                convertBtn.disabled = false;
                startTimeSlider.max = video.duration;
                statusText.innerText = `サイズ: ${video.videoWidth}x${video.videoHeight}`;
            };
        }
    });

    function applyAdvancedChromakey(imgData, hex, range, smooth) {
        const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
        const d = imgData.data;
        for (let i = 0; i < d.length; i += 4) {
            const distance = Math.sqrt(Math.pow(d[i]-r,2) + Math.pow(d[i+1]-g,2) + Math.pow(d[i+2]-b,2));
            if (distance < range) { d[i+3] = 0; }
            else if (distance < range + smooth) { d[i+3] = ((distance - range) / smooth) * 255; }
        }
        return imgData;
    }

    const crcTable = new Int32Array(256);
    for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=(c&1)?(0xedb88320^(c>>>1)):(c>>>1);crcTable[n]=c;}
    function calculateCrc(d){let c=-1;for(let i=0;i<d.length;i++)c=(c>>>8)^crcTable[(c^d[i])&0xff];return(c^-1)>>>0;}
    function patchApngBinary(b,l){const v=new DataView(b);let o=8;while(o<v.byteLength){const len=v.getUint32(o);const t=String.fromCharCode(...new Uint8Array(b,o+4,4));if(t==='acTL'){v.setUint32(o+12,l);const cd=new Uint8Array(b,o+4,len+4);v.setUint32(o+8+len,calculateCrc(cd));break;}o+=len+12;}return b;}

    convertBtn.addEventListener('click', async () => {
        convertBtn.disabled = true;
        statusText.innerText = "変換中...（閉じずにお待ちください）";
        document.getElementById('previewContainer').style.display = 'none';

        const rawDur = video.duration;
        const targetDur = Math.max(1, Math.min(4, Math.round(rawDur)));
        const loopVal = parseInt(document.getElementById('loopCount').value);
        const hex = chromaHex.value;
        const range = parseFloat(document.getElementById('rangeSlider').value);
        const smooth = parseFloat(document.getElementById('smoothSlider').value);

        const w = video.videoWidth;
        const h = video.videoHeight;
        canvas.width = w; canvas.height = h;

        const finalFrames = [];
        const finalDelays = [];
        const totalMsPerLoop = (targetDur * 1000) / loopVal;
        
        try {
            // 1. 表紙
            video.currentTime = parseFloat(startTimeSlider.value);
            await new Promise(r => video.onseeked = r);
            ctx.drawImage(video, 0, 0, w, h);
            finalFrames.push(applyAdvancedChromakey(ctx.getImageData(0,0,w,h), hex, range, smooth).data.buffer);
            finalDelays.push(10);

            // 2. アニメーション
            const remainingMs = totalMsPerLoop - 10;
            const frameCount = 19;
            const delay = Math.floor(remainingMs / frameCount);

            for (let i = 0; i < frameCount; i++) {
                video.currentTime = (i / (frameCount - 1)) * Math.min(rawDur, 4);
                await new Promise(r => video.onseeked = r);
                ctx.drawImage(video, 0, 0, w, h);
                finalFrames.push(applyAdvancedChromakey(ctx.getImageData(0,0,w,h), hex, range, smooth).data.buffer);
                finalDelays.push((i === frameCount - 1) ? (remainingMs - (delay * (frameCount - 1))) : delay);
            }

            let ab = UPNG.encode(finalFrames, w, h, 256, finalDelays);
            ab = patchApngBinary(ab, loopVal);
            const url = URL.createObjectURL(new Blob([ab], {type: 'image/png'}));
            
            document.getElementById('resultImgContainer').innerHTML = `<img src="${url}">`;
            document.getElementById('previewContainer').style.display = 'block';
            statusText.innerText = "作成成功！画像を長押し保存";
        } catch (e) {
            statusText.innerText = "エラー: " + e.message;
            alert("処理中にエラーが発生しました。動画を短くするか、解像度を下げて試してください。");
        }
        convertBtn.disabled = false;
    });
</script>
</body>
</html>
