<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>preBuild for hp2025</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { font-size: 1.2rem; text-align: center; color: #007aff; margin-bottom: 20px; }
        .item { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 5px; font-weight: bold; }
        select, input, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
        button { background: #007aff; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; font-size: 0.85rem; color: #d00; text-align: center; white-space: pre-wrap; }
        video { display: none; } /* プレビュー不要な場合は非表示 */
    </style>
</head>
<body>

<div class="container">
    <h1>preBuild for hp2025</h1>
    
    <div class="item">
        <label>1. 動画を選択</label>
        <input type="file" id="videoInput" accept="video/mp4,video/quicktime">
    </div>

    <div class="item">
        <label>2. 分割秒数</label>
        <select id="splitSec">
            <option value="1">1秒</option>
            <option value="2">2秒</option>
            <option value="3">3秒</option>
            <option value="4">4秒</option>
        </select>
    </div>

    <div class="item">
        <label>3. ファイル名 桁数</label>
        <select id="digit">
            <option value="2">2桁 (01, 02...)</option>
            <option value="3">3桁 (001, 002...)</option>
        </select>
    </div>

    <div class="item">
        <label>4. 開始数値</label>
        <input type="number" id="startNum" value="1" min="0">
    </div>

    <button id="startBtn">分割・圧縮を開始</button>
    <div id="status"></div>
    <video id="v" playsinline muted></video>
</div>

<script>
    const videoInput = document.getElementById('videoInput');
    const splitSec = document.getElementById('splitSec');
    const digit = document.getElementById('digit');
    const startNum = document.getElementById('startNum');
    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');
    const video = document.getElementById('v');

    startBtn.addEventListener('click', async () => {
        const file = videoInput.files[0];
        if (!file) return alert('動画を選択してください');

        startBtn.disabled = true;
        status.style.color = "#666";
        status.innerText = "処理中... (動画の長さと同じ時間がかかります)";

        const zip = new JSZip();
        const duration = await getDuration(file);
        const interval = parseInt(splitSec.value);
        const videoUrl = URL.createObjectURL(file);
        video.src = videoUrl;

        let currentTime = 0;
        let index = 0;

        try {
            while (currentTime < duration) {
                status.innerText = `分割中: ${Math.round((currentTime/duration)*100)}%`;
                
                const blob = await extractSegment(video, currentTime, interval);
                const fileNum = parseInt(startNum.value) + index;
                const fileName = String(fileNum).padStart(parseInt(digit.value), '0') + ".mp4";
                
                zip.file(fileName, blob);
                
                currentTime += interval;
                index++;
            }

            status.innerText = "ZIPを生成中...";
            const zipBlob = await zip.generateAsync({type: "blob"});
            const downloadUrl = URL.createObjectURL(zipBlob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = "split_videos.zip";
            a.click();
            
            status.style.color = "green";
            status.innerText = "完了しました！";
        } catch (e) {
            console.error(e);
            status.innerText = "エラー: " + e.message;
        } finally {
            startBtn.disabled = false;
            URL.revokeObjectURL(videoUrl);
        }
    });

    function getDuration(file) {
        return new Promise(resolve => {
            const v = document.createElement('video');
            v.src = URL.createObjectURL(file);
            v.onloadedmetadata = () => resolve(v.duration);
        });
    }

    function extractSegment(v, start, duration) {
        return new Promise(resolve => {
            const stream = v.captureStream();
            const recorder = new MediaRecorder(stream, { mimeType: 'video/mp4; codecs=avc1' });
            const chunks = [];

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => resolve(new Blob(chunks, { type: 'video/mp4' }));

            v.currentTime = start;
            v.onseeked = () => {
                v.play();
                recorder.start();
                setTimeout(() => {
                    recorder.stop();
                    v.pause();
                }, duration * 1000);
            };
        });
    }
</script>

</body>
</html>
