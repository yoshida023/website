<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>preBuild for hp2025</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { font-size: 1.2rem; text-align: center; color: #007aff; margin-bottom: 20px; }
        .item { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 5px; font-weight: bold; }
        select, input, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
        button { background: #007aff; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; font-size: 0.85rem; color: #666; text-align: center; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h1>preBuild for hp2025</h1>
    <div class="item">
        <label>1. 動画を選択 (MP4)</label>
        <input type="file" id="videoInput" accept="video/mp4,video/quicktime">
    </div>
    <div class="item">
        <label>2. 分割秒数</label>
        <select id="splitSec">
            <option value="1">1秒</option>
            <option value="2">2秒</option>
            <option value="3">3秒</option>
            <option value="4">4秒</option>
        </select>
    </div>
    <div class="item">
        <label>3. ファイル名 桁数</label>
        <select id="digit">
            <option value="2">2桁</option>
            <option value="3">3桁</option>
        </select>
    </div>
    <div class="item">
        <label>4. 開始数値</label>
        <input type="number" id="startNum" value="1" min="0">
    </div>
    <button id="startBtn">分割・圧縮を開始</button>
    <div id="status">待機中</div>
</div>

<script type="module">
    import { Muxer, ArrayBufferTarget } from 'https://unpkg.com/mp4-muxer@latest/build/mp4-muxer.mjs';

    const videoInput = document.getElementById('videoInput');
    const splitSec = document.getElementById('splitSec');
    const digit = document.getElementById('digit');
    const startNum = document.getElementById('startNum');
    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');

    startBtn.addEventListener('click', async () => {
        const file = videoInput.files[0];
        if (!file) return alert('動画を選択してください');

        startBtn.disabled = true;
        status.innerText = "動画を初期化中...";

        const video = document.createElement('video');
        video.playsInline = true;
        video.muted = true;
        video.src = URL.createObjectURL(file);

        try {
            await video.play(); 
            video.pause();

            const width = video.videoWidth;
            const height = video.videoHeight;
            const vWidth = width - (width % 2);
            const vHeight = height - (height % 2);
            const duration = video.duration;
            const intervalSec = parseInt(splitSec.value);
            const fps = 30;
            const totalFramesPerSegment = intervalSec * fps; // 1ファイルあたりのフレーム数を固定
            const zip = new JSZip();

            // 描画安定化のためのCanvas
            const canvas = document.createElement('canvas');
            canvas.width = vWidth;
            canvas.height = vHeight;
            const ctx = canvas.getContext('2d');

            let currentGlobalTime = 0;
            let fileCount = 0;

            while (currentGlobalTime < duration) {
                status.innerText = `分割中: ${fileCount + 1}個目...`;
                
                const muxer = new Muxer({
                    target: new ArrayBufferTarget(),
                    video: { codec: 'avc', width: vWidth, height: vHeight },
                    fastStart: 'in-memory'
                });

                let isConfigured = false;
                const encoder = new VideoEncoder({
                    output: (chunk, meta) => {
                        if (meta && meta.decoderConfig) isConfigured = true;
                        muxer.addVideoChunk(chunk, meta);
                    },
                    error: (e) => { throw e; }
                });

                encoder.configure({
                    codec: 'avc1.42E01E',
                    width: vWidth,
                    height: vHeight,
                    bitrate: 1_200_000,
                    framerate: fps,
                    latencyMode: 'realtime'
                });

                // フレーム処理ループ
                for (let i = 0; i < totalFramesPerSegment; i++) {
                    const timestamp = currentGlobalTime + (i / fps);
                    if (timestamp >= duration) break; // 動画終了なら終了

                    video.currentTime = timestamp;
                    await new Promise(r => {
                        const onSeeked = () => {
                            video.removeEventListener('seeked', onSeeked);
                            r();
                        };
                        video.addEventListener('seeked', onSeeked);
                    });

                    // Canvasに転写することで描画を確定させる
                    ctx.drawImage(video, 0, 0, vWidth, vHeight);
                    
                    const frame = new VideoFrame(canvas, { 
                        timestamp: Math.round(i * (1000000 / fps)) 
                    });
                    
                    encoder.encode(frame, { keyFrame: i === 0 });
                    frame.close();

                    // iPhone対策: 初回のみメタデータ確定待ち
                    if (i === 0 && !isConfigured) {
                        for (let j = 0; j < 20 && !isConfigured; j++) {
                            await new Promise(r => setTimeout(r, 50));
                        }
                    }
                }

                await encoder.flush();
                muxer.finalize();

                const fileName = String(parseInt(startNum.value) + fileCount).padStart(parseInt(digit.value), '0') + ".mp4";
                zip.file(fileName, muxer.target.buffer);

                currentGlobalTime += intervalSec;
                fileCount++;
                
                // 動画の最後まで到達していたらループを抜ける
                if (currentGlobalTime >= duration) break;
            }

            status.innerText = "ZIP生成中...";
            const blob = await zip.generateAsync({ type: "blob" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "preBuild_split.zip";
            a.click();
            status.style.color = "green";
            status.innerText = "完了しました";

        } catch (e) {
            console.error(e);
            status.innerText = "エラー: " + e.message;
        } finally {
            startBtn.disabled = false;
        }
    });
</script>
</body>
</html>
