<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>preBuild for hp2025</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { font-size: 1.2rem; text-align: center; color: #007aff; margin-bottom: 20px; }
        .item { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 5px; font-weight: bold; }
        select, input, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
        button { background: #007aff; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; font-size: 0.85rem; color: #666; text-align: center; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h1>preBuild for hp2025</h1>
    
    <div class="item">
        <label>1. 動画を選択 (MP4)</label>
        <input type="file" id="videoInput" accept="video/mp4,video/quicktime">
    </div>

    <div class="item">
        <label>2. 分割秒数</label>
        <select id="splitSec">
            <option value="1">1秒</option>
            <option value="2">2秒</option>
            <option value="3">3秒</option>
            <option value="4">4秒</option>
        </select>
    </div>

    <div class="item">
        <label>3. ファイル名 桁数</label>
        <select id="digit">
            <option value="2">2桁 (01, 02...)</option>
            <option value="3">3桁 (001, 002...)</option>
        </select>
    </div>

    <div class="item">
        <label>4. 開始数値</label>
        <input type="number" id="startNum" value="1" min="0">
    </div>

    <button id="startBtn">分割・圧縮を開始</button>
    <div id="status">待機中</div>
</div>

<script type="module">
    import { Muxer, ArrayBufferTarget } from 'https://unpkg.com/mp4-muxer@latest/build/mp4-muxer.mjs';

    const videoInput = document.getElementById('videoInput');
    const splitSec = document.getElementById('splitSec');
    const digit = document.getElementById('digit');
    const startNum = document.getElementById('startNum');
    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');

    startBtn.addEventListener('click', async () => {
        const file = videoInput.files[0];
        if (!file) return alert('動画を選択してください');

        startBtn.disabled = true;
        status.innerText = "動画データを読み込み中...";

        const video = document.createElement('video');
        video.playsInline = true;
        video.muted = true;
        video.preload = "auto";
        const videoUrl = URL.createObjectURL(file);
        video.src = videoUrl;

        try {
            // 【重要】iPhoneで動画データを強制的にバッファリングさせる処理
            await new Promise((resolve, reject) => {
                video.onloadeddata = async () => {
                    try {
                        // 一瞬再生して即座に停止することで、iPhoneにデコーダーを準備させる
                        await video.play();
                        video.pause();
                        video.currentTime = 0;
                        resolve();
                    } catch (e) {
                        reject(new Error("iPhoneの再生制限により動画を初期化できませんでした。"));
                    }
                };
                video.onerror = () => reject(new Error("動画ファイルの形式が読み込めません。"));
                setTimeout(() => reject(new Error("読み込みがタイムアウトしました。")), 15000);
            });

            // readyStateが4（十分なデータがある状態）になるのを待つ
            if (video.readyState < 4) {
                await new Promise(r => video.oncanplaythrough = r);
            }

            const width = video.videoWidth;
            const height = video.videoHeight;
            const duration = video.duration;
            const interval = parseInt(splitSec.value);
            const fps = 30;
            const zip = new JSZip();

            const vWidth = width - (width % 2);
            const vHeight = height - (height % 2);

            let currentStartTime = 0;
            let fileCount = 0;

            while (currentStartTime < duration) {
                const segmentDuration = Math.min(interval, duration - currentStartTime);
                status.innerText = `分割中: ${fileCount + 1}個目のファイル...`;

                const muxer = new Muxer({
                    target: new ArrayBufferTarget(),
                    video: { codec: 'avc', width: vWidth, height: vHeight },
                    fastStart: 'in-memory'
                });

                const encoder = new VideoEncoder({
                    output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
                    error: (e) => { throw e; }
                });

                encoder.configure({
                    codec: 'avc1.42E01E', 
                    width: vWidth,
                    height: vHeight,
                    bitrate: 1_200_000, 
                    framerate: fps
                });

                for (let t = 0; t < segmentDuration; t += (1/fps)) {
                    const timestamp = currentStartTime + t;
                    if (timestamp >= duration) break;

                    video.currentTime = timestamp;
                    
                    // シークが完了し、描画可能になるまで待機
                    await new Promise(r => {
                        const onSeeked = () => {
                            video.removeEventListener('seeked', onSeeked);
                            r();
                        };
                        video.addEventListener('seeked', onSeeked);
                    });

                    // 念押し：データがあることを確認してからVideoFrame化
                    if (video.readyState >= 2) {
                        const frame = new VideoFrame(video, { timestamp: Math.round(t * 1_000_000) });
                        encoder.encode(frame, { keyFrame: t === 0 });
                        frame.close();
                    }
                }

                await encoder.flush();
                muxer.finalize();

                const fileName = String(parseInt(startNum.value) + fileCount).padStart(parseInt(digit.value), '0') + ".mp4";
                zip.file(fileName, muxer.target.buffer);

                currentStartTime += interval;
                fileCount++;
            }

            status.innerText = "ZIP生成中...";
            const zipBlob = await zip.generateAsync({ type: "blob" });
            const downloadUrl = URL.createObjectURL(zipBlob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = `preBuild_split.zip`;
            a.click();

            status.innerText = "完了！";

        } catch (e) {
            console.error(e);
            status.innerText = `エラー: ${e.message}\n※iPhoneの省電力モードをオフにして試してください。`;
        } finally {
            startBtn.disabled = false;
            URL.revokeObjectURL(videoUrl);
        }
    });
</script>

</body>
</html>
