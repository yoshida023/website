<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>preBuild for hp2025</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { font-size: 1.2rem; text-align: center; color: #007aff; margin-bottom: 20px; }
        .item { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 5px; font-weight: bold; }
        select, input, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
        button { background: #007aff; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; font-size: 0.85rem; color: #666; text-align: center; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h1>preBuild for hp2025</h1>
    
    <div class="item">
        <label>1. 動画を選択 (MP4)</label>
        <input type="file" id="videoInput" accept="video/mp4,video/quicktime">
    </div>

    <div class="item">
        <label>2. 分割秒数</label>
        <select id="splitSec">
            <option value="1">1秒</option>
            <option value="2">2秒</option>
            <option value="3">3秒</option>
            <option value="4">4秒</option>
        </select>
    </div>

    <div class="item">
        <label>3. ファイル名 桁数</label>
        <select id="digit">
            <option value="2">2桁 (01, 02...)</option>
            <option value="3">3桁 (001, 002...)</option>
        </select>
    </div>

    <div class="item">
        <label>4. 開始数値</label>
        <input type="number" id="startNum" value="1" min="0">
    </div>

    <button id="startBtn">分割・圧縮を開始</button>
    <div id="status">待機中</div>
</div>

<script type="module">
    // mp4-muxerをインポート
    import { Muxer, ArrayBufferTarget } from 'https://unpkg.com/mp4-muxer@latest/build/mp4-muxer.mjs';

    const videoInput = document.getElementById('videoInput');
    const splitSec = document.getElementById('splitSec');
    const digit = document.getElementById('digit');
    const startNum = document.getElementById('startNum');
    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');

    startBtn.addEventListener('click', async () => {
        const file = videoInput.files[0];
        if (!file) return alert('動画を選択してください');

        if (!window.VideoEncoder) {
            return alert('お使いのブラウザはWebCodecsに対応していません。最新のiOS/Safari、またはChromeをお使いください。');
        }

        startBtn.disabled = true;
        status.innerText = "動画を解析中...\n(iPhoneの場合、少し時間がかかることがあります)";

        try {
            const zip = new JSZip();
            const interval = parseInt(splitSec.value);
            const startIdx = parseInt(startNum.value);
            const digitVal = parseInt(digit.value);

            // 動画読み込み用の準備
            const video = document.createElement('video');
            video.src = URL.createObjectURL(file);
            video.muted = true;
            video.playsInline = true;
            
            await new Promise((resolve) => {
                video.onloadedmetadata = resolve;
            });

            const width = video.videoWidth;
            const height = video.videoHeight;
            const duration = video.duration;
            const fps = 30; // 処理の安定性のための固定FPS

            let currentStartTime = 0;
            let fileCount = 0;

            while (currentStartTime < duration) {
                const segmentDuration = Math.min(interval, duration - currentStartTime);
                status.innerText = `分割中: ${fileCount + 1}個目のファイルを作成中...`;

                const muxer = new Muxer({
                    target: new ArrayBufferTarget(),
                    video: { 
                        codec: 'avc', 
                        width: width % 2 === 0 ? width : width - 1, 
                        height: height % 2 === 0 ? height : height - 1 
                    },
                    fastStart: 'in-memory'
                });

                const encoder = new VideoEncoder({
                    output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
                    error: (e) => { throw e; }
                });

                // iPhone/Safariでも通りやすいH.264設定
                encoder.configure({
                    codec: 'avc1.42E01E', 
                    width: width % 2 === 0 ? width : width - 1,
                    height: height % 2 === 0 ? height : height - 1,
                    bitrate: 2_500_000, // 2.5Mbps
                    framerate: fps
                });

                // フレーム抽出ループ
                for (let t = 0; t < segmentDuration; t += (1/fps)) {
                    video.currentTime = currentStartTime + t;
                    // seeked完了を待機
                    await new Promise(r => {
                        const onSeeked = () => {
                            video.removeEventListener('seeked', onSeeked);
                            r();
                        };
                        video.addEventListener('seeked', onSeeked);
                    });
                    
                    const frame = new VideoFrame(video, { timestamp: t * 1_000_000 });
                    encoder.encode(frame, { keyFrame: t === 0 });
                    frame.close();
                }

                await encoder.flush();
                muxer.finalize();

                const { buffer } = muxer.target;
                const fileName = String(startIdx + fileCount).padStart(digitVal, '0') + ".mp4";
                zip.file(fileName, buffer);

                currentStartTime += interval;
                fileCount++;
            }

            status.innerText = "ZIPを生成しています...";
            const zipBlob = await zip.generateAsync({ type: "blob" });
            const downloadUrl = URL.createObjectURL(zipBlob);
            
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = `preBuild_split_${Date.now()}.zip`;
            a.click();

            status.style.color = "green";
            status.innerText = "成功しました！ダウンロードを確認してください。";
            
        } catch (e) {
            console.error(e);
            status.style.color = "red";
            status.innerText = "エラーが発生しました:\n" + e.message;
        } finally {
            startBtn.disabled = false;
        }
    });
</script>

</body>
</html>
