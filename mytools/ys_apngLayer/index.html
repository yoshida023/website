<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APNG Layer Mobile</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/1.0.11/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upng-js@2.1.0/UPNG.min.js"></script>
    
    <style>
        :root { --primary: #2196F3; --bg: #121212; --card: #252525; --text: #eee; --border: #444; --danger: #f44336; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-top: 220px; }
        .transparent-bg { background-image: linear-gradient(45deg, #333 25%, transparent 25%), linear-gradient(-45deg, #333 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #333 75%), linear-gradient(-45deg, transparent 75%, #333 75%); background-size: 8px 8px; background-color: #222; }

        .fixed-header { position: fixed; top: 0; left: 0; right: 0; background: var(--bg); z-index: 100; padding: 10px; border-bottom: 2px solid var(--primary); }
        .preview-box { display: flex; justify-content: center; align-items: center; gap: 15px; }
        #main-canvas { border: 1px solid #555; max-width: 120px; height: auto; background: #000; }
        .main-controls { display: flex; flex-direction: column; gap: 6px; }

        .lane-loaders { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; background: #1a1a1a; margin-top: 10px; }
        .lane-btn { font-size: 11px; padding: 12px 2px; text-align: center; background: var(--primary); border-radius: 4px; color: white; font-weight: bold; cursor: pointer; }

        .frame-list { padding: 10px; }
        .frame-card { background: var(--card); border-radius: 10px; margin-bottom: 12px; padding: 10px; border: 1px solid var(--border); }
        .lane-grid { display: grid; grid-template-columns: repeat(3, 1fr) 70px; gap: 8px; }
        
        .thumb-container { width: 100%; aspect-ratio: 1/1; border: 1px solid #444; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; margin-bottom: 5px; }
        .thumb-img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
        
        .btn-group { display: flex; flex-direction: column; gap: 4px; }
        .btn-move { background: #444; color: white; border: 1px solid #666; padding: 8px 0; font-size: 16px; border-radius: 4px; }
        .btn-clear { background: #333; color: var(--danger); border: 1px solid var(--danger); padding: 4px 0; font-size: 10px; border-radius: 4px; font-weight: bold; }
        .btn-move:active, .btn-clear:active { opacity: 0.7; }
        
        .result-preview { width: 70px; height: 70px; border: 2px solid var(--primary); border-radius: 4px; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; }

        #setup-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .setup-box { background: var(--card); width: 100%; padding: 30px; border-radius: 15px; text-align: center; border: 1px solid var(--primary); }
        button { border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-orange { background: #FF9800; color: white; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="setup-box">
        <h2 style="color:var(--primary); margin-top:0;">APNG Layer Mobile</h2>
        <button style="width:100%; margin-bottom:12px; padding:20px; background:var(--primary); color:white;" onclick="initApp('stamp')">アニメスタンプ</button>
        <button style="width:100%; padding:20px; background:#FF9800; color:white;" onclick="initApp('emoji')">アニメ絵文字</button>
    </div>
</div>

<div class="fixed-header">
    <div class="preview-box">
        <canvas id="main-canvas" class="transparent-bg" onclick="togglePlayback()"></canvas>
        <div class="main-controls">
            <div id="frame-counter" style="font-size:12px; font-weight:bold;">FRAME: 1 / 20</div>
            <div style="display:flex; gap:5px;">
                <button onclick="setSpeed(100)" style="padding:5px; font-size:10px; background:#444; color:white;">標準</button>
                <button onclick="setSpeed(200)" style="padding:5px; font-size:10px; background:#444; color:white;">低速</button>
            </div>
            <button class="btn-orange" onclick="exportFinalAPNG()" style="padding:8px; font-size:11px;">保存</button>
        </div>
    </div>
    <div class="lane-loaders">
        <div class="lane-btn" onclick="document.getElementById('load-l0').click()">L1 読込</div>
        <div class="lane-btn" onclick="document.getElementById('load-l1').click()">L2 読込</div>
        <div class="lane-btn" onclick="document.getElementById('load-l2').click()">L3 読込</div>
    </div>
    <input type="file" id="load-l0" hidden onchange="loadApngToLane(0, this)">
    <input type="file" id="load-l1" hidden onchange="loadApngToLane(1, this)">
    <input type="file" id="load-l2" hidden onchange="loadApngToLane(2, this)">
</div>

<div id="frame-list-container" class="frame-list"></div>

<script src="project-manager.js"></script>
<script src="editor-logic.js"></script>
</body>
</html>
